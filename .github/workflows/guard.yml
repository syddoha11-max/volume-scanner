name: holdings-guard-scan
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: repo-state-commit
  cancel-in-progress: false
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run holdings guard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SMTP_HOST:    ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT:    ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER:         ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:         ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python holdings_guard.py
      - name: Persist guard state
        run: |
          if [ -n "$(git status --porcelain state_guard.json)" ]; then
            git config user.name "vol-scanner-bot"; git config user.email "actions@users.noreply.github.com"
            git pull --rebase --autostash || true
            git add state_guard.json; git commit -m "update guard state [skip ci]"; git push || true
          else echo "no state change"; fi
